<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Rabbit Hole | Discover the Hidden Web</title>
    <style>
        /* CSS: Website ka Design */
        :root {
            --bg-color: #0f0f13;
            --text-main: #e0e0e0;
            --accent: #00f3ff;
            --accent-hover: #ff0055;
            --card-bg: #1a1a24;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }

        header {
            margin-bottom: 40px;
        }

        h1 {
            font-size: 3rem;
            letter-spacing: 2px;
            color: var(--text-main);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        h1 span {
            color: var(--accent);
        }

        p.subtitle {
            font-size: 1.1rem;
            color: #888;
            max-width: 500px;
            margin: 0 auto;
        }

        /* "Surprise Me" Button Design */
        .btn-surprise {
            background-color: transparent;
            color: var(--accent);
            border: 2px solid var(--accent);
            padding: 18px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 5px;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
        }

        .btn-surprise:hover {
            background-color: var(--accent);
            color: var(--bg-color);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.6);
            transform: translateY(-3px);
        }

        /* Result Card Design */
        #result-card {
            margin-top: 40px;
            background-color: var(--card-bg);
            border-left: 4px solid var(--accent-hover);
            padding: 30px;
            border-radius: 8px;
            max-width: 600px;
            width: 100%;
            display: none; /* Hidden by default */
            opacity: 0;
            transition: opacity 0.5s ease;
            text-align: left;
        }

        .category-tag {
            font-size: 0.8rem;
            background-color: #333;
            color: var(--accent);
            padding: 4px 8px;
            border-radius: 3px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
            margin-bottom: 15px;
        }

        #result-title {
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: white;
        }

        #result-desc {
            font-size: 1rem;
            color: #aaa;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .go-link {
            display: inline-block;
            background-color: var(--accent-hover);
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 4px;
            transition: background 0.3s;
        }

        .go-link:hover {
            background-color: #ff3377;
        }

        /* Footer */
        footer {
            margin-top: auto;
            padding-top: 50px;
            font-size: 0.9rem;
            color: #555;
        }
    </style>
</head>
<body>

    <header>
        <h1>The <span>Rabbit Hole</span></h1>
        <p class="subtitle">Escape the algorithm. Discover the weird, wonderful, and hidden corners of the internet.</p>
    </header>

    <button class="btn-surprise" onclick="digDeeper()">Surprise Me</button>

    <div id="result-card">
        <div class="category-tag" id="result-category">Category</div>
        <h2 id="result-title">Title Here</h2>
        <p id="result-desc">Description of the cool thing they are about to see goes right here.</p>
        <a href="#" target="_blank" class="go-link" id="result-link">Enter the Hole &rarr;</a>
    </div>

    <footer>
        <p>Curated for curious minds. No algorithms allowed.</p>
    </footer>

    <script>
        // JavaScript: Data and Logic
        const database = [
    {
        title: "Marginalia Search",
        category: "Tool / Search",
        desc: "An independent search engine that actively ignores modern, SEO-optimized, commercial websites to help you find the 'old internet'.",
        url: "https://www.google.com"
    }    
];

        let lastIndex = -1; // To ensure we don't get the same link twice in a row

        function digDeeper() {
            // Get DOM elements
            const card = document.getElementById('result-card');
            const titleEl = document.getElementById('result-title');
            const catEl = document.getElementById('result-category');
            const descEl = document.getElementById('result-desc');
            const linkEl = document.getElementById('result-link');

            // Pick a random item, but not the same as the last one
            let randomIndex;
            do {
                randomIndex = Math.floor(Math.random() * database.length);
            } while (randomIndex === lastIndex && database.length > 1);
            
            lastIndex = randomIndex;
            const item = database[randomIndex];

            // Update content
            titleEl.textContent = item.title;
            catEl.textContent = item.category;
            descEl.textContent = item.desc;
            linkEl.href = item.url;

            // Show card with a fade-in effect
            card.style.display = 'block';
            setTimeout(() => {
                card.style.opacity = '1';
                card.style.transform = 'translateY(10px)'; // slight drop effect
            }, 10);
        }
    </script>
</body>
</html>
